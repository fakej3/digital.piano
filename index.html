<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KeyWave — Browser Piano</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="app-header">
    <div class="logo">
      <span class="logo-icon">♪</span>
      <span class="logo-text">KeyWave</span>
    </div>
    <div class="header-controls">
      <button id="themeToggle" class="icon-btn" title="Toggle dark/light mode">
        <span class="theme-icon">🌙</span>
      </button>
    </div>
  </header>

  <!-- ===== MAIN LAYOUT ===== -->
  <main class="app-main">

    <!-- ===== TOP CONTROL BAR ===== -->
    <section class="control-bar glass-card">

      <!-- Volume -->
      <div class="control-group">
        <label class="control-label">🔊 Volume</label>
        <div class="slider-wrap">
          <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.75" />
          <span id="volumeVal" class="slider-val">75%</span>
        </div>
      </div>

      <!-- Sustain -->
      <div class="control-group">
        <label class="control-label">Sustain</label>
        <button id="sustainBtn" class="toggle-btn" aria-pressed="false">OFF</button>
      </div>

      <!-- Labels toggle -->
      <div class="control-group">
        <label class="control-label">Key Labels</label>
        <button id="labelsBtn" class="toggle-btn active" aria-pressed="true">ON</button>
      </div>

      <!-- Active note display -->
      <div class="control-group note-display-group">
        <label class="control-label">Playing</label>
        <div id="noteDisplay" class="note-display">—</div>
      </div>

    </section>

    <!-- ===== PIANO KEYBOARD ===== -->
    <section class="piano-section glass-card">
      <div class="piano-container" id="pianoContainer" role="group" aria-label="Piano keyboard">
        <!-- Keys are generated by JS -->
      </div>
      <div class="piano-scroll-hint">← Scroll or swipe to see more keys →</div>
    </section>

    <!-- ===== BOTTOM PANEL (3 columns) ===== -->
    <div class="bottom-grid">

      <!-- RECORD / PLAYBACK -->
      <section class="panel glass-card">
        <h2 class="panel-title">🎙 Recorder</h2>
        <div class="recorder-controls">
          <button id="recordBtn" class="action-btn record-btn">⏺ Record</button>
          <button id="playBtn" class="action-btn" disabled>▶ Play</button>
          <button id="clearBtn" class="action-btn danger-btn" disabled>✕ Clear</button>
        </div>
        <div id="recordingStatus" class="recorder-status">Idle</div>
        <div id="recordingLength" class="recorder-length"></div>
      </section>

      <!-- METRONOME -->
      <section class="panel glass-card">
        <h2 class="panel-title">🥁 Metronome</h2>
        <div class="metronome-display">
          <div id="metronomeLight" class="metro-light"></div>
          <div id="metroBPMDisplay" class="metro-bpm">120</div>
          <div class="metro-bpm-label">BPM</div>
        </div>
        <div class="slider-wrap">
          <input type="range" id="bpmSlider" min="40" max="240" step="1" value="120" />
        </div>
        <div class="metronome-btn-row">
          <button id="metroToggle" class="action-btn">▶ Start</button>
          <select id="beatSelect" class="beat-select">
            <option value="4">4/4</option>
            <option value="3">3/4</option>
            <option value="2">2/4</option>
          </select>
        </div>
      </section>

      <!-- KEYBOARD GUIDE -->
      <section class="panel glass-card">
        <h2 class="panel-title">⌨ Keyboard Guide</h2>
        <div class="key-guide">
          <div class="guide-row">
            <div class="guide-item white-guide"><kbd>A</kbd><span>C</span></div>
            <div class="guide-item black-guide"><kbd>W</kbd><span>C#</span></div>
            <div class="guide-item white-guide"><kbd>S</kbd><span>D</span></div>
            <div class="guide-item black-guide"><kbd>E</kbd><span>D#</span></div>
            <div class="guide-item white-guide"><kbd>D</kbd><span>E</span></div>
            <div class="guide-item white-guide"><kbd>F</kbd><span>F</span></div>
            <div class="guide-item black-guide"><kbd>T</kbd><span>F#</span></div>
            <div class="guide-item white-guide"><kbd>G</kbd><span>G</span></div>
            <div class="guide-item black-guide"><kbd>Y</kbd><span>G#</span></div>
            <div class="guide-item white-guide"><kbd>H</kbd><span>A</span></div>
            <div class="guide-item black-guide"><kbd>U</kbd><span>A#</span></div>
            <div class="guide-item white-guide"><kbd>J</kbd><span>B</span></div>
          </div>
          <p class="guide-tip">💡 Hold multiple keys for chords. Use <kbd>Space</kbd> to toggle sustain.</p>
        </div>
      </section>

    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
